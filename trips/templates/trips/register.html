<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Traveloop</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
      --accent: #f5a623; --accent2: #e05c3a; --text: #e8e4dc; --muted: #7a7a8c;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 420px;
    }
    .brand {
      font-family: 'DM Serif Display', serif; font-size: 1.8rem;
      color: var(--accent); text-align: center; margin-bottom: 0.4rem;
    }
    .brand span { color: var(--accent2); }
    .subtitle { text-align: center; color: var(--muted); font-size: 0.9rem; margin-bottom: 1.8rem; }
    .form-group { margin-bottom: 1.2rem; }
    label { display: block; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-bottom: 0.4rem; }
    .form-control {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); padding: 0.7rem 1rem;
      font-size: 0.95rem; font-family: 'DM Sans', sans-serif; outline: none;
      transition: border-color 0.2s;
    }
    .form-control:focus { border-color: var(--accent); }
    .form-control::placeholder { color: var(--muted); }
    .btn {
      width: 100%; padding: 0.8rem; border-radius: 10px; font-size: 1rem;
      font-weight: 600; border: none; cursor: pointer; transition: opacity 0.2s;
      background: var(--accent); color: #0f1117; margin-top: 0.5rem;
    }
    .btn:hover { opacity: 0.85; }
    .footer-link { text-align: center; margin-top: 1.4rem; font-size: 0.88rem; color: var(--muted); }
    .footer-link a { color: var(--accent); text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }
    .messages { list-style: none; margin-bottom: 1rem; }
    .messages li { padding: 0.6rem 0.9rem; border-radius: 8px; font-size: 0.88rem; }
    .messages .error { background: rgba(255,59,48,0.15); color: #ff3b30; border: 1px solid rgba(255,59,48,0.25); }
    .messages .success { background: rgba(52,199,89,0.15); color: #34c759; border: 1px solid rgba(52,199,89,0.25); }
    .hint { font-size: 0.78rem; color: var(--muted); margin-top: 0.3rem; }
  </style>
</head>
<body>

<div class="card">
  <div class="brand">Travel<span>oop</span></div>
  <p class="subtitle">Create a new account</p>

  {% if messages %}
  <ul class="messages">
    {% for message in messages %}
      <li class="{{ message.tags }}">{{ message }}</li>
    {% endfor %}
  </ul>
  {% endif %}

  <form method="post" action="{% url 'register' %}">
    {% csrf_token %}
    <div class="form-group">
      <label>Username *</label>
      <input type="text" name="username" class="form-control" placeholder="e.g. arjun_travels" required autofocus />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" class="form-control" placeholder="you@example.com" />
      <p class="hint">Optional but useful for account recovery.</p>
    </div>
    <div class="form-group">
      <label>Password *</label>
      <input type="password" name="password1" class="form-control" placeholder="••••••••" required />
    </div>
    <div class="form-group">
      <label>Confirm Password *</label>
      <input type="password" name="password2" class="form-control" placeholder="••••••••" required />
    </div>
    <button type="submit" class="btn">Create Account →</button>
  </form>

  <p class="footer-link">Already have an account? <a href="{% url 'login' %}">Sign in</a></p>
</div>

</body>
</html>
